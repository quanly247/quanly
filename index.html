<!doctype html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HạnhPhúcPM - Đăng kí</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  font-family: Arial, sans-serif;
  background:
    radial-gradient(circle at top left, #2563eb, transparent 35%),
    radial-gradient(circle at bottom right, #0f766e, transparent 35%),
    #020617;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
}

.card {
  width: 390px;
  padding: 32px 28px;
  border-radius: 24px;
  background: rgba(15, 23, 42, 0.92);
  border: 1px solid rgba(255,255,255,0.14);
  box-shadow: 0 30px 80px rgba(0,0,0,0.55);
}

.logo { text-align: center; margin-bottom: 26px; }

.logo-icon {
  width: 62px;
  height: 62px;
  margin: 0 auto 12px;
  border-radius: 18px;
  background: linear-gradient(135deg, #38bdf8, #2563eb);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 900;
  box-shadow: 0 0 35px rgba(56,189,248,0.35);
}

.logo-title {
  font-size: 28px;
  font-weight: 900;
}

.logo-title span { color: #38bdf8; }

.logo-sub {
  font-size: 13px;
  color: #94a3b8;
  margin-top: 7px;
}

.title {
  font-size: 20px;
  font-weight: 800;
  margin-bottom: 18px;
}

.input {
  width: 100%;
  height: 50px;
  border-radius: 13px;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.07);
  color: white;
  padding: 0 14px;
  margin-bottom: 13px;
  outline: none;
  font-size: 14px;
}

.input::placeholder { color: #94a3b8; }

.input:focus {
  border-color: #38bdf8;
  box-shadow: 0 0 0 3px rgba(56,189,248,0.14);
}

.note {
  font-size: 12px;
  color: #cbd5e1;
  line-height: 1.5;
  margin-bottom: 14px;
}

.check {
  display: flex;
  gap: 8px;
  font-size: 12px;
  color: #cbd5e1;
  line-height: 1.45;
  margin-bottom: 18px;
}

.btn {
  width: 100%;
  height: 50px;
  border: none;
  border-radius: 14px;
  background: linear-gradient(135deg, #38bdf8, #2563eb);
  color: white;
  font-weight: 900;
  cursor: pointer;
  font-size: 15px;
}

.btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.msg {
  margin-top: 16px;
  font-size: 13px;
  text-align: center;
  color: #38bdf8;
}

.footer {
  margin-top: 20px;
  text-align: center;
  font-size: 11px;
  color: #64748b;
}
</style>
</head>

<body>

<div class="card">

  <div class="logo">
    <div class="logo-icon">&lt;/&gt;</div>
    <div class="logo-title">HạnhPhúc<span>PM</span></div>
    <div class="logo-sub">Secure Management Platform</div>
  </div>

  <div class="title">Đăng kí tài khoản</div>

  <form id="form">

    <input
      class="input"
      name="phone"
      placeholder="🇻🇳 +84 Nhập số điện thoại"
      required
    >

    <!-- Honeypot chống bot -->
    <input
      type="text"
      name="botcheck"
      style="display:none"
      tabindex="-1"
      autocomplete="off"
    >

    <div class="note">
      Ứng dụng cần quyền vị trí để xác minh khu vực đăng kí.
      Hệ thống sẽ gửi số điện thoại, IP, khu vực gần đúng, GPS nếu được cho phép và thông tin thiết bị.
    </div>

    <label class="check">
      <input type="checkbox" id="agree" required>
      <span>Tôi đồng ý gửi số điện thoại và thông tin vị trí để đăng kí.</span>
    </label>

    <button class="btn" id="btn" type="submit">Đăng kí</button>

    <div class="msg" id="msg"></div>
  </form>

  <div class="footer">Protected by secure verification</div>

</div>

<script>
const form = document.getElementById("form");
const msg = document.getElementById("msg");
const btn = document.getElementById("btn");
const agree = document.getElementById("agree");

const WEB3FORMS_KEY = "245da7df-7f91-458f-8691-b6e5a6664882";

// ===== CHECK SỐ ĐIỆN THOẠI VIỆT NAM =====
function isValidVietnamPhone(phone) {
  const cleaned = phone.replace(/\s+/g, "");
  return /^(0|\+84|84)[0-9]{9,10}$/.test(cleaned);
}

// ===== CHỐNG SPAM CƠ BẢN =====
function canSubmitNow() {
  const lastSubmit = localStorage.getItem("last_submit_time");
  const now = Date.now();

  if (lastSubmit && now - Number(lastSubmit) < 30000) {
    return false;
  }

  localStorage.setItem("last_submit_time", now.toString());
  return true;
}

// ===== LẤY GPS =====
function getGPS() {
  return new Promise((resolve) => {
    if (!navigator.geolocation) {
      resolve({
        status: "Không hỗ trợ GPS",
        lat: "",
        lon: "",
        accuracy: ""
      });
      return;
    }

    navigator.geolocation.getCurrentPosition(
      (pos) => {
        resolve({
          status: "Được cho phép",
          lat: pos.coords.latitude,
          lon: pos.coords.longitude,
          accuracy: pos.coords.accuracy
        });
      },
      () => {
        resolve({
          status: "Bị từ chối",
          lat: "",
          lon: "",
          accuracy: ""
        });
      },
      {
        enableHighAccuracy: true,
        timeout: 8000,
        maximumAge: 0
      }
    );
  });
}

// ===== LẤY IP =====
async function getIPInfo() {
  try {
    const res = await fetch("https://ipapi.co/json/");
    const data = await res.json();

    return {
      ip: data.ip || "Không xác định",
      city: data.city || "",
      region: data.region || "",
      country: data.country_name || "",
      org: data.org || "",
      timezone: data.timezone || ""
    };
  } catch {
    return {
      ip: "Không xác định",
      city: "",
      region: "",
      country: "",
      org: "",
      timezone: ""
    };
  }
}

// ===== SUBMIT =====
form.addEventListener("submit", async function(e) {
  e.preventDefault();

  const phone = form.phone.value.trim();
  const botcheck = form.botcheck.value;

  if (botcheck !== "") return;

  if (!agree.checked) {
    msg.innerText = "Bạn cần đồng ý trước khi đăng kí.";
    return;
  }

  if (!isValidVietnamPhone(phone)) {
    msg.innerText = "Số điện thoại không hợp lệ.";
    return;
  }

  if (!canSubmitNow()) {
    msg.innerText = "Bạn thao tác quá nhanh, vui lòng thử lại sau 30 giây.";
    return;
  }

  btn.disabled = true;
  msg.innerText = "Đang xác minh vị trí...";

  const gps = await getGPS();

  msg.innerText = "Đang xử lý đăng kí...";

  const ipInfo = await getIPInfo();

  let mapLink = "Không có GPS";
  if (gps.lat && gps.lon) {
    mapLink = `https://www.google.com/maps?q=${gps.lat},${gps.lon}`;
  }

  const payload = {
    access_key: WEB3FORMS_KEY,
    subject: "Đăng kí mới từ HạnhPhúcPM",

    "Số điện thoại": phone,

    "GPS trạng thái": gps.status,
    "GPS latitude": gps.lat,
    "GPS longitude": gps.lon,
    "GPS độ chính xác mét": gps.accuracy,
    "Google Maps": mapLink,

    "IP": ipInfo.ip,
    "Khu vực IP": `${ipInfo.city}, ${ipInfo.region}, ${ipInfo.country}`,
    "Nhà mạng": ipInfo.org,
    "Timezone": ipInfo.timezone,

    "Thiết bị": navigator.userAgent,
    "Ngôn ngữ": navigator.language,
    "Màn hình": `${screen.width}x${screen.height}`,
    "Thời gian": new Date().toLocaleString("vi-VN")
  };

  try {
    const response = await fetch("https://api.web3forms.com/submit", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Accept": "application/json"
      },
      body: JSON.stringify(payload)
    });

    const result = await response.json();

    if (result.success) {
      msg.innerText = "Đăng kí thành công!";
      form.reset();
    } else {
      msg.innerText = "Gửi thất bại, vui lòng thử lại.";
    }
  } catch {
    msg.innerText = "Lỗi kết nối, vui lòng thử lại.";
  }

  btn.disabled = false;
});
</script>

</body>
</html>
